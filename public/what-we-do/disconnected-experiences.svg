<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" fill="none" role="img" aria-label="Connected, consistent omnichannel experience illustration">
  <defs>
    <linearGradient id="de-bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1422"/>
      <stop offset="1" stop-color="#05080d"/>
    </linearGradient>
    <linearGradient id="de-grad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8ec5ff"/>
      <stop offset="0.5" stop-color="#68b2ff"/>
      <stop offset="1" stop-color="#007dfe"/>
    </linearGradient>
    <radialGradient id="de-glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#68b2ff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#68b2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#de-bg)"/>
  <circle cx="405" cy="230" r="250" fill="url(#de-glow)"/>

  <!-- links from hub to channels -->
  <g stroke="url(#de-grad)" stroke-width="3" opacity="0.55">
    <line x1="405" y1="230" x2="225" y2="135"/>
    <line x1="405" y1="230" x2="585" y2="135"/>
    <line x1="405" y1="230" x2="225" y2="330"/>
    <line x1="405" y1="230" x2="585" y2="330"/>
  </g>

  <!-- central hub -->
  <circle cx="405" cy="230" r="50" fill="url(#de-grad)"/>
  <g stroke="#05080d" stroke-width="3.4" fill="#05080d">
    <path d="M405 214 L391 244 M405 214 L419 244 M391 244 L419 244" fill="none"/>
    <circle cx="405" cy="214" r="5"/>
    <circle cx="391" cy="244" r="5"/>
    <circle cx="419" cy="244" r="5"/>
  </g>

  <!-- channel: chat (top-left) -->
  <circle cx="225" cy="135" r="38" fill="#0a111c" stroke="url(#de-grad)" stroke-width="3"/>
  <path d="M206 124 h34 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-18 l-12 10 v-10 a6 6 0 0 1 -4 -6 v-12 a6 6 0 0 1 4 -6 z" fill="url(#de-grad)"/>

  <!-- channel: phone (top-right) -->
  <circle cx="585" cy="135" r="38" fill="#0a111c" stroke="url(#de-grad)" stroke-width="3"/>
  <g stroke="url(#de-grad)" stroke-width="3" fill="none">
    <rect x="572" y="115" width="26" height="40" rx="6"/>
    <line x1="580" y1="121" x2="590" y2="121"/>
  </g>
  <circle cx="585" cy="148" r="2.4" fill="url(#de-grad)"/>

  <!-- channel: mail (bottom-left) -->
  <circle cx="225" cy="330" r="38" fill="#0a111c" stroke="url(#de-grad)" stroke-width="3"/>
  <g stroke="url(#de-grad)" stroke-width="3" fill="none" stroke-linejoin="round">
    <rect x="205" y="317" width="40" height="27" rx="4"/>
    <path d="M205 321 l20 15 l20 -15"/>
  </g>

  <!-- channel: person (bottom-right) -->
  <circle cx="585" cy="330" r="38" fill="#0a111c" stroke="url(#de-grad)" stroke-width="3"/>
  <g fill="url(#de-grad)">
    <circle cx="585" cy="321" r="9"/>
    <path d="M566 349 a19 19 0 0 1 38 0 z"/>
  </g>
</svg>
