<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" fill="none" role="img" aria-label="Broader global reach and coverage illustration">
  <defs>
    <linearGradient id="lr-bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1422"/>
      <stop offset="1" stop-color="#05080d"/>
    </linearGradient>
    <linearGradient id="lr-grad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8ec5ff"/>
      <stop offset="0.5" stop-color="#68b2ff"/>
      <stop offset="1" stop-color="#007dfe"/>
    </linearGradient>
    <radialGradient id="lr-glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#68b2ff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#68b2ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="lr-globe">
      <circle cx="400" cy="235" r="120"/>
    </clipPath>
  </defs>

  <rect width="800" height="450" fill="url(#lr-bg)"/>
  <circle cx="400" cy="225" r="250" fill="url(#lr-glow)"/>

  <!-- orbit arcs (reach) -->
  <g stroke="url(#lr-grad)" stroke-width="2.4" fill="none" opacity="0.4" stroke-dasharray="6 10">
    <ellipse cx="400" cy="235" rx="190" ry="74" transform="rotate(-20 400 235)"/>
    <ellipse cx="400" cy="235" rx="190" ry="74" transform="rotate(28 400 235)"/>
  </g>

  <!-- globe -->
  <g clip-path="url(#lr-globe)" stroke="url(#lr-grad)" stroke-width="2.4" fill="none" opacity="0.9">
    <line x1="280" y1="235" x2="520" y2="235"/>
    <line x1="280" y1="190" x2="520" y2="190"/>
    <line x1="280" y1="280" x2="520" y2="280"/>
    <ellipse cx="400" cy="235" rx="46" ry="120"/>
    <ellipse cx="400" cy="235" rx="92" ry="120"/>
  </g>
  <circle cx="400" cy="235" r="120" fill="none" stroke="url(#lr-grad)" stroke-width="3.2"/>

  <!-- location pins -->
  <g fill="url(#lr-grad)">
    <g transform="translate(300,150)"><path d="M0 0 C -9 -13 -9 -22 0 -26 C 9 -22 9 -13 0 0 Z"/></g>
    <g transform="translate(516,168)"><path d="M0 0 C -9 -13 -9 -22 0 -26 C 9 -22 9 -13 0 0 Z"/></g>
    <g transform="translate(470,330)"><path d="M0 0 C -9 -13 -9 -22 0 -26 C 9 -22 9 -13 0 0 Z"/></g>
  </g>
  <g fill="#05080d">
    <circle cx="300" cy="135" r="3.4"/>
    <circle cx="516" cy="153" r="3.4"/>
    <circle cx="470" cy="315" r="3.4"/>
  </g>
</svg>
