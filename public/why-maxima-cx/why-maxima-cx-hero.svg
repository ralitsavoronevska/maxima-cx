<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" fill="none" role="img" aria-label="Maxima CX performance and growth illustration">
  <defs>
    <linearGradient id="wmh-bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse"><stop stop-color="#0c1422"/><stop offset="1" stop-color="#05080d"/></linearGradient>
    <linearGradient id="wmh-g" x1="0" y1="1" x2="1" y2="0"><stop stop-color="#8ec5ff"/><stop offset="0.5" stop-color="#68b2ff"/><stop offset="1" stop-color="#007dfe"/></linearGradient>
    <linearGradient id="wmh-area" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#68b2ff" stop-opacity="0.5"/><stop offset="1" stop-color="#68b2ff" stop-opacity="0"/></linearGradient>
    <radialGradient id="wmh-glow" cx="0.5" cy="0.5" r="0.5"><stop stop-color="#68b2ff" stop-opacity="0.42"/><stop offset="1" stop-color="#68b2ff" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#wmh-bg)"/>
  <circle cx="470" cy="210" r="280" fill="url(#wmh-glow)"/>

  <!-- main performance panel -->
  <rect x="320" y="92" width="404" height="276" rx="22" fill="#0a111c" stroke="url(#wmh-g)" stroke-width="2.4"/>
  <line x1="320" y1="134" x2="724" y2="134" stroke="url(#wmh-g)" stroke-width="1.6" opacity="0.45"/>
  <circle cx="344" cy="113" r="5" fill="url(#wmh-g)"/>
  <circle cx="362" cy="113" r="5" fill="url(#wmh-g)" opacity="0.55"/>
  <circle cx="380" cy="113" r="5" fill="url(#wmh-g)" opacity="0.3"/>

  <!-- area + line chart -->
  <path d="M360 300 L424 262 L488 282 L552 226 L616 244 L688 176 L688 338 L360 338 Z" fill="url(#wmh-area)"/>
  <path d="M360 300 L424 262 L488 282 L552 226 L616 244 L688 176" fill="none" stroke="url(#wmh-g)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#0a111c" stroke="url(#wmh-g)" stroke-width="3"><circle cx="552" cy="226" r="6"/><circle cx="688" cy="176" r="6"/></g>

  <!-- floating glass card with KPI donut -->
  <rect x="84" y="150" width="196" height="150" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="url(#wmh-g)" stroke-width="1.6"/>
  <circle cx="132" cy="210" r="30" fill="none" stroke="#1b2a3f" stroke-width="9"/>
  <circle cx="132" cy="210" r="30" fill="none" stroke="url(#wmh-g)" stroke-width="9" stroke-linecap="round" stroke-dasharray="142 188" transform="rotate(-90 132 210)"/>
  <rect x="180" y="190" width="76" height="10" rx="5" fill="url(#wmh-g)" opacity="0.85"/>
  <rect x="180" y="212" width="54" height="10" rx="5" fill="url(#wmh-g)" opacity="0.5"/>

  <!-- orb accent -->
  <circle cx="150" cy="96" r="30" fill="url(#wmh-g)"/>
  <circle cx="140" cy="86" r="8" fill="#ffffff" fill-opacity="0.55"/>

  <!-- trust check badge -->
  <circle cx="300" cy="372" r="42" fill="#05080d" stroke="url(#wmh-g)" stroke-width="3.2"/>
  <path d="M282 372 l12 13 l24 -27" fill="none" stroke="url(#wmh-g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
